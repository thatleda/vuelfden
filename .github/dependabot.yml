version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directory: .github/workflows
    rebase-strategy: auto
    schedule:
      interval: daily
    assignees:
      - thatleda

  - package-ecosystem: bun
    directory: /
    rebase-strategy: auto
    schedule:
      interval: daily
    assignees:
      - thatleda
    allow:
      - dependency-type: direct
    versioning-strategy: auto
    pull-request-branch-name:
      separator: /
