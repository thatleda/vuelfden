packages:
  - .
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true

catalog:
  '@antfu/eslint-config': 9.0.0
  '@nuxt/fonts': 0.14.0
  '@nuxt/image': 2.0.0
  '@nuxtjs/color-mode': 4.0.1
  '@playwright/test': 1.60.0
  '@portabletext/types': 4.0.2
  '@portabletext/vue': 1.0.14
  '@sanity/client': 7.22.1
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/vue': 8.1.0
  '@vitejs/plugin-vue': 6.0.7
  '@vue/test-utils': 2.4.11
  '@vueuse/core': 14.3.0
  '@vueuse/nuxt': 14.3.0
  dayjs: 1.11.21
  dotenv-cli: 11.0.0
  emoji-regex: 10.6.0
  eslint: 10.4.1
  eslint-plugin-playwright: 2.10.4
  eslint-plugin-testing-library: 7.16.2
  eslint-plugin-vuejs-accessibility: 2.5.0
  groq: 6.0.0
  happy-dom: 20.10.3
  lighthouse: 13.4.0
  netlify-cli: 26.1.0
  nuxt: 4.4.8
  nuxt-graphql-middleware: 5.4.0
  playwright: 1.60.0
  typescript: 6.0.3
  vitest: 4.1.9
  vue: 3.5.38
  vue-router: 5.1.0

minimumReleaseAgeExclude:
  - eslint-plugin-playwright@2.10.4

overrides:
  uuid: '>=13.0.1'
  multiparty: '>=4.3.0'
  tmp: '>=0.2.6'
  shell-quote: '>=1.8.4'
  esbuild: '>=0.28.1'
  vite: '>=7.3.5'
  ws: '>=8.21.0'
  tar: '>=7.5.16'
  '@opentelemetry/core': '>=2.8.0'
  js-yaml: '>=4.2.0'
  '@babel/core': '>=7.29.6'
  launch-editor: '>=2.14.1'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver
  - chokidar
  - '@netlify/*'
