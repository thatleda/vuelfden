packages:
  - .
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true

catalog:
  '@antfu/eslint-config': 9.0.0
  '@nuxt/fonts': 0.14.0
  '@nuxt/image': 2.0.0
  '@nuxtjs/color-mode': 4.0.0
  '@playwright/test': 1.60.0
  '@portabletext/types': 4.0.2
  '@portabletext/vue': 1.0.14
  '@sanity/client': 7.22.1
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/vue': 8.1.0
  '@vitejs/plugin-vue': 6.0.7
  '@vue/test-utils': 2.4.10
  '@vueuse/core': 14.3.0
  '@vueuse/nuxt': 14.3.0
  dayjs: 1.11.21
  dotenv-cli: 11.0.0
  emoji-regex: 10.6.0
  eslint: 10.4.1
  eslint-plugin-playwright: 2.10.4
  eslint-plugin-testing-library: 7.16.2
  eslint-plugin-vuejs-accessibility: 2.5.0
  groq: 5.28.0
  happy-dom: 20.9.0
  lighthouse: 13.3.0
  netlify-cli: 26.0.2
  nuxt: 4.4.7
  nuxt-graphql-middleware: 5.4.0
  playwright: 1.60.0
  typescript: 6.0.3
  vitest: 4.1.7
  vue: 3.5.35
  vue-router: 5.1.0

minimumReleaseAgeExclude:
  - eslint-plugin-playwright@2.10.4

overrides:
  uuid: '>=13.0.1'
  multiparty: '>=4.3.0'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver
  - chokidar
  - '@netlify/*'
