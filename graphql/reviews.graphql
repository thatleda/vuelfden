query reviews {
  me {
    user_books(
      where: {
        has_review: { _eq: true }
        _and: {
          privacy_setting: { setting: { _eq: "Public" } }
          reviewed_at: { _is_null: false }
        }
      }
      order_by: { reviewed_at: desc }
    ) {
      rating
      review_slate
      reviewed_at
      book {
        title
        slug
        image {
          url
        }
        release_year
        contributions {
          author {
            name
          }
        }
      }
    }
  }
}
